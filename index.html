<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/fpdc.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cc-crochet</title>
</head>

<body class="no-scroll">
    <div id="top-bar">
        CC-Crochet Corals
        <!-- <select id="lang-select">
            <option value="en">English</option>
            <option value="de">Deutsch</option>
        </select> -->
    </div>
    <div class="canvas-container" id="canvas"></div>
    <div id="overlay" class="overlay">
        <span>Tutorial:</span>
        <div class="tutorial" id="tutorial">
                <div class="card-border">
                <div class="pattern-card">
                    <div class="scene" style="touch-action: none;">
                        <div id="scene-tut"></div>
                    </div>
                    <div class="card-controls">
                        <button data-i18n="toggleChart" id="toggle-btn-tut">
                            <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" stroke="black"
                                stroke-width="5" stroke-linecap="round">
                                <line x1="35" y1="10" x2="65" y2="10"></line>
                                <line x1="42" y1="45" x2="58" y2="35"></line>
                                <path d="M 50 10 V 65 A 15 15, 0 1 1, 35 80" fill="none"></path>
                            </svg>
                        </button>
                        <button data-i18n="download" id="dnld-btn-tut">
                            <svg xmlns="http://www.w3.org/2000/svg" height="100%"
                                viewBox="0 0 32 32" stroke="black" fill="none">
                                <path d="M16 3 V21"></path>
                                <path d="M10 15 L16 21 L22 15"></path>
                                <path d="M6 20V24C6 25.1046 6.89543 26 8 26H24C25.1046 26 26 25.1046 26 24V20"></path>
                            </svg>
                        </button>
                        <div class="spacer"></div>
                        <button class="select-btn" id="select-btn-tut"></button>
                    </div>
                </div>
            </div>

        </div>

        <div class="tut-text left-top" data-target="scene-tut">
            model of finished piece
        </div>

        <div class="tut-text left-top" data-target="toggle-btn-tut">
            show the crochet chart
        </div>
        <div class="tut-text right-bot" data-target="dnld-btn-tut">
            download chart (future work)
        </div>
        <div class="tut-text right-top" data-target="select-btn-tut">
            select pattern
        </div>
        <div class="tut-text left-top" data-target="seed-btn">
            restart with fresh batch
        </div>
        <div class="tut-text right-top" data-target="gen-btn">
            generate next batch based on selected
        </div>
        

        <button id="cont-btn" disabled>Loading...</button>
        
    </div>

    <div id="bot-bar">
        <button id="seed-btn">New Seed</button>
        <button id="gen-btn">Next Generation</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
